<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex 额度</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="liquid-bg" aria-hidden="true">
      <div class="liquid-surface">
        <span class="liquid-wave wave-a"></span>
        <span class="liquid-wave wave-b"></span>
      </div>
    </div>
    <main class="shell">
      <div class="card-stage">
        <div class="card-rotor">
          <section class="quota-card card-face card-front" aria-live="polite">
            <div class="card-glow"></div>
            <header class="card-header">
              <div class="profile">
                <div id="avatar" class="avatar" aria-describedby="displayName" tabindex="0"></div>
                <span id="displayName" class="profile-name">Codex</span>
              </div>
              <button id="planBadge" class="plan-badge" type="button" aria-label="翻转卡片查看额度铭文">--</button>
            </header>

            <div id="bars" class="bars">
              <article class="quota-row loading" data-quota-row="primary">
                <div class="row-top">
                  <span data-title>5小时额度</span>
                  <strong data-value="primary">--%</strong>
                </div>
                <div class="progress-track"><div class="progress-fill" data-fill="primary"></div></div>
                <p data-reset>读取中</p>
              </article>
              <article class="quota-row loading" data-quota-row="secondary">
                <div class="row-top">
                  <span data-title>周额度</span>
                  <strong data-value="secondary">--%</strong>
                </div>
                <div class="progress-track"><div class="progress-fill" data-fill="secondary"></div></div>
                <p data-reset>读取中</p>
              </article>
            </div>

            <footer class="card-footer">
              <span id="updatedAt"></span>
            </footer>
          </section>

          <section class="quota-card card-face card-back" aria-hidden="true" tabindex="-1" role="button" aria-label="返回额度面板">
            <div class="card-glow"></div>
            <div class="card-back-panel inscription-panel">
              <p class="back-label">CODEX QUOTA CARD</p>
              <p id="quotaInscription" class="quota-inscription">今日算力校准中。</p>
              <p id="inscriptionDetail" class="inscription-detail">持卡人 CODEX · --</p>
              <p id="inscriptionSeal" class="inscription-seal">CODΞX RESERVED</p>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
